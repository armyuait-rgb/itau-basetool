name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  test:
    name: test / ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Verify patches apply to clean upstream tag
        run: pytest tests/patches/test_patches_apply.py -q

      - name: Verify upstream import side effects
        run: pytest tests/patches/test_import_side_effects.py -q

      - name: Run unit tests with coverage gate
        run: pytest tests/unit/ -q --cov=modules/basetool/adapter --cov=modules/basetool/runner --cov-report=term-missing --cov-fail-under=80

      - name: Run per-method localhost smoke
        run: python scripts/smoke/runner-methods-smoke.py

      - name: Run regression snapshot smoke
        run: python scripts/smoke/runner-regression-smoke.py

  stability:
    name: stability / ubuntu-latest
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run stability smoke
        run: python scripts/smoke/runner-stability-smoke.py --duration 60

  build:
    name: build release artifact
    needs: stability
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build tarball
        run: python scripts/release/build-release-artifact.py --from-tag

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: basetool-runner-release
          path: dist/basetool-runner-*

  verify:
    name: verify release artifact
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: basetool-runner-release
          path: dist

      - name: Verify tarball
        run: python scripts/release/verify-release-artifact.py

  simulate:
    name: simulate downstream stage
    needs: verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: basetool-runner-release
          path: dist

      - name: Simulate downstream staging
        run: python scripts/release/simulate-downstream-stage.py

  publish:
    name: publish github release
    needs: simulate
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact
        if: needs.simulate.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: basetool-runner-release
          path: dist

      - name: Create release
        if: needs.simulate.result == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          PRERELEASE=false
          if [[ "$TAG" == *smoke* ]]; then
            PRERELEASE=true
          fi
          gh release create "$TAG" dist/*.tar.gz dist/*.sha256 \
            --title "$TAG" \
            --generate-notes \
            --prerelease="$PRERELEASE"

      - name: Mark failed release as prerelease
        if: needs.simulate.result != 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release create "$TAG" \
            --title "$TAG (failed verification)" \
            --notes "Release verification failed. Marked prerelease so auto-update will ignore it." \
            --prerelease=true \
            || true
