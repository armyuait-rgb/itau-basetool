name: Proxy workability (container)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  container-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build workability image
        run: docker build -t megatool-proxy-workability:ci .

      - name: Dry-run inside container
        run: docker run --rm megatool-proxy-workability:ci --dry-run

      - name: Smoke inside container
        run: docker run --rm megatool-proxy-workability:ci --smoke

      - name: Smoke on host (parity)
        run: |
          python3 -m pip install --quiet -r requirements.txt
          python3 scripts/check_proxy_workability.py --dry-run
          python3 scripts/check_proxy_workability.py --smoke
